name: Package & Release Banshee

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXTENSION_ID: nikdelnhblojmiomnbelngndekgbakdp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔔 Discord — Début de la mise à jour
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 Banshee — Mise à jour en cours\",
                \"description\": \"Un nouveau push a été détecté sur \`main\`. Publication sur le Chrome Web Store en cours…\",
                \"color\": 3447003,
                \"footer\": { \"text\": \"GitHub Actions\" }
              }]
            }"

      - name: Lire la version du manifest
        id: version
        run: echo "VERSION=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

      - name: Créer le zip de l'extension
        run: |
          zip -r banshee.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.pem" \
            -x "*.crx" \
            -x "node_modules/*" \
            -x "*.zip"
          echo "✅ banshee.zip créé"

      - name: Obtenir un access token Google
        id: token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo $RESPONSE | jq -r .access_token)
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Impossible d'obtenir l'access token"
            echo $RESPONSE
            exit 1
          fi
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Access token obtenu"

      - name: Uploader le zip sur le Chrome Web Store
        id: upload
        run: |
          RESPONSE=$(curl -s -X PUT \
            -H "Authorization: Bearer ${{ steps.token.outputs.ACCESS_TOKEN }}" \
            -H "x-goog-api-version: 2" \
            -T banshee.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ env.EXTENSION_ID }}")
          echo "Upload response: $RESPONSE"
          STATUS=$(echo $RESPONSE | jq -r .uploadState)
          if [ "$STATUS" != "SUCCESS" ] && [ "$STATUS" != "IN_PROGRESS" ]; then
            echo "❌ Upload échoué : $STATUS"
            exit 1
          fi
          echo "✅ Upload réussi : $STATUS"

      - name: Publier sur le Chrome Web Store
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.token.outputs.ACCESS_TOKEN }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ env.EXTENSION_ID }}/publish")
          echo "Publish response: $RESPONSE"
          STATUS=$(echo $RESPONSE | jq -r .status[0])
          if [ "$STATUS" != "OK" ] && [ "$STATUS" != "PUBLISHED_WITH_FRICTION" ]; then
            echo "❌ Publication échouée : $STATUS"
            exit 1
          fi
          echo "✅ Publication réussie : $STATUS"

      - name: 🎉 Discord — Succès
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Banshee v${{ steps.version.outputs.VERSION }} — Publiée sur le Web Store !\",
                \"description\": \"La mise à jour a été publiée avec succès.\nChrome la déploiera automatiquement aux utilisateurs.\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"Version\", \"value\": \"\`${{ steps.version.outputs.VERSION }}\`\", \"inline\": true },
                  { \"name\": \"Store\", \"value\": \"[Voir l'extension](https://chromewebstore.google.com/detail/banshee/nikdelnhblojmiomnbelngndekgbakdp)\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"[Voir sur GitHub](https://github.com/LicheKingggg/banshee/commits/main)\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"GitHub Actions\" }
              }]
            }"

      - name: ❌ Discord — Échec
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Banshee — Échec du déploiement\",
                \"description\": \"Une erreur est survenue pendant la publication.\n[Voir les logs](https://github.com/LicheKingggg/banshee/actions)\",
                \"color\": 15158332,
                \"footer\": { \"text\": \"GitHub Actions\" }
              }]
            }"
