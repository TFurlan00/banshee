<style>
  #banshee-banner * { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes banshee-slideIn {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes banshee-popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  #banshee-banner {
    font-family: 'Poppins', system-ui, sans-serif;
    background: #1a1d26;
    border: 1px solid rgba(239,68,68,0.3);
    border-left: 3px solid #ef4444;
    color: #e8ecf0;
    padding: 12px 14px 12px 16px;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(239,68,68,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 200px;
    max-width: 280px;
    animation: banshee-slideIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    pointer-events: auto;
  }
  #banshee-banner .b-flag {
    flex-shrink: 0;
    width: 32px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: banshee-popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  }
  #banshee-banner .b-flag img {
    width: 32px;
    height: auto;
    border-radius: 3px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    display: block;
  }
  #banshee-banner .b-content { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  #banshee-banner .b-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: #7f1d1d; color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
    padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    width: fit-content;
  }
  #banshee-banner .b-studio {
    font-size: 13px; font-weight: 600; color: #e8ecf0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #banshee-banner .b-country { font-size: 11px; color: #5a6070; }
  #banshee-banner .b-close {
    background: rgba(255,255,255,0.06); border: none; color: #5a6070;
    font-size: 11px; cursor: pointer; border-radius: 50%;
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s, color .15s; line-height: 1;
  }
  #banshee-banner .b-close:hover { background: rgba(255,255,255,0.14); color: #e8ecf0; }
</style>
<div id="banshee-banner">
  <div class="b-flag" id="b-flag">
    <img src="https://flagcdn.com/w40/un.png" alt="?">
  </div>
  <div class="b-content">
    <span class="b-badge">✕ Hors Europe</span>
    <span class="b-studio" id="b-studio"></span>
    <span class="b-country" id="b-country"></span>
  </div>
  <button class="b-close" onclick="(this.closest('.banshee-wrap')||this.closest('#banshee-banner')).remove()">✕</button>
</div>
